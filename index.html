<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rive Icon Animator</title>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    input[type=range] { -webkit-appearance: none; background: transparent; }
    input[type=range]:focus { outline: none; }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; height: 16px; width: 16px;
      border-radius: 50%; background: #3b82f6; cursor: pointer; margin-top: -6px;
    }
    input[type=range]::-webkit-slider-runnable-track {
      width: 100%; height: 4px; cursor: pointer; background: #262626; border-radius: 2px;
    }
    input[type=range]::-moz-range-thumb {
      height: 16px; width: 16px; border-radius: 50%; background: #3b82f6; cursor: pointer; border: none;
    }
    input[type=range]::-moz-range-track {
      width: 100%; height: 4px; cursor: pointer; background: #262626; border-radius: 2px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    // Inline SVG icons to replace lucide-react
    const DownloadIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    );
    const CopyIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>
    );
    const CheckIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-green-400"><polyline points="20 6 9 17 4 12"/></svg>
    );
    const SearchIcon = ({size = 18}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
    );
    const XIcon = ({size = 20}) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    );
    const ExternalLinkIcon = () => (
      <svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3h6v6"/><path d="M10 14 21 3"/><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>
    );

    const POPULAR_ICONS = [
      'home', 'search', 'settings', 'favorite', 'menu', 'close', 'check', 'star', 'add', 'delete', 'edit', 'person', 'mail', 'notifications', 'shopping_cart', 'info', 'help', 'warning', 'error', 'thumb_up', 'visibility', 'lock', 'schedule', 'language', 'face', 'lightbulb', 'article', 'shopping_bag', 'chat', 'phone', 'camera', 'videocam', 'mic', 'play_arrow', 'pause', 'stop', 'skip_next', 'skip_previous', 'volume_up', 'volume_off', 'music_note', 'flight', 'directions_car', 'local_cafe', 'restaurant', 'hotel', 'fitness_center', 'wifi', 'battery_full', 'bluetooth', 'usb', 'cloud', 'wb_sunny', 'nightlight_round', 'ac_unit', 'auto_awesome', 'rocket_launch', 'cruelty_free', 'eco', 'pets', 'emoji_events', 'sports_esports', 'palette', 'brush', 'format_paint', 'imagesmode', 'camera_alt', 'movie', 'music_video', 'audiotrack', 'mic_external_on', 'headset', 'speaker', 'tv', 'desktop_windows', 'laptop_mac', 'smartphone', 'tablet_mac', 'watch', 'keyboard', 'mouse', 'gamepad', 'router', 'scanner', 'print', 'save', 'folder', 'description', 'insert_drive_file', 'cloud_upload', 'cloud_download', 'attachment', 'link', 'share', 'reply', 'forward', 'send', 'archive', 'unarchive', 'delete_outline', 'delete_forever', 'content_copy', 'content_cut', 'content_paste', 'undo', 'redo'
    ];

    function App() {
      const [iconName, setIconName] = useState('auto_awesome');
      const [isFilled, setIsFilled] = useState(false);
      const [animStyle, setAnimStyle] = useState('pulse');
      const [speed, setSpeed] = useState(1.0);
      const [blur, setBlur] = useState(0);
      const [glow, setGlow] = useState(1.0);
      const [color, setColor] = useState('#5A7541');
      const [copied, setCopied] = useState(false);
      const [isPickerOpen, setIsPickerOpen] = useState(false);
      const [searchQuery, setSearchQuery] = useState('');

      const filteredIcons = POPULAR_ICONS.filter(icon => icon.includes(searchQuery.toLowerCase()));

      const getKeyframes = () => {
        switch(animStyle) {
          case 'pulse': return '0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); }';
          case 'spin': return '0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); }';
          case 'float': return '0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); }';
          case 'shake': return '0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-15deg); } 75% { transform: rotate(15deg); }';
          default: return '0%, 100% { transform: scale(1); }';
        }
      };

      const duration = speed > 0 ? (2 / speed).toFixed(2) : 0;
      const timingFunc = animStyle === 'spin' ? 'linear' : 'ease-in-out';

      const generateCSS = () => {
        return `.animated-icon {\n  color: ${color};\n  filter: drop-shadow(0 0 ${glow * 10}px ${color}) blur(${blur}px);\n  animation: icon-anim ${duration}s infinite ${timingFunc};\n  display: inline-block;\n  font-size: 64px;\n  font-variation-settings: 'FILL' ${isFilled ? 1 : 0};\n}\n\n@keyframes icon-anim {\n  ${getKeyframes()}\n}`;
      };

      const generateReactCode = () => {
        return `import React from 'react';\n\nexport const AnimatedIcon = ({ name = '${iconName}', size = 64 }) => {\n  return (\n    <>\n      <style>{\\`\n        .custom-animated-icon {\n          color: ${color};\n          filter: drop-shadow(0 0 ${glow * 10}px ${color}) blur(${blur}px);\n          animation: custom-icon-anim ${duration}s infinite ${timingFunc};\n          display: inline-block;\n          font-size: \\${size}px;\n          font-variation-settings: 'FILL' ${isFilled ? 1 : 0};\n        }\n        @keyframes custom-icon-anim {\n          ${getKeyframes()}\n        }\n      \\`}</style>\n      <span className="material-symbols-outlined custom-animated-icon">\n        {name}\n      </span>\n    </>\n  );\n};\n\nexport default AnimatedIcon;`;
      };

      const handleCopyCSS = () => {
        navigator.clipboard.writeText(generateCSS());
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const handleExportReact = () => {
        const element = document.createElement("a");
        const file = new Blob([generateReactCode()], {type: 'text/plain'});
        element.href = URL.createObjectURL(file);
        element.download = "AnimatedIcon.tsx";
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
      };

      return (
        <div className="min-h-screen bg-[#0a0a0a] text-white flex flex-col md:flex-row font-sans">
          {/* Left: Preview Area */}
          <div className="flex-1 flex flex-col items-center justify-center border-b md:border-b-0 md:border-r border-neutral-800 p-8 relative overflow-hidden">
            <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNDAiIGhlaWdodD0iNDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGRlZnM+PHBhdHRlcm4gaWQ9ImdyaWQiIHdpZHRoPSI0MCIgaGVpZ2h0PSI0MCIgcGF0dGVyblVuaXRzPSJ1c2VyU3BhY2VPblVzZSI+PHBhdGggZD0iTSAwIDEwIEwgNDAgMTAgTSAxMCAwIEwgMTAgNDAiIGZpbGw9Im5vbmUiIHN0cm9rZT0icmdiYSgyNTUsMjU1LDI1NSwwLjAyKSIgc3Ryb2tlLXdpZHRoPSIxIi8+PC9wYXR0ZXJuPjwvZGVmcz48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSJ1cmwoI2dyaWQpIi8+PC9zdmc+')] opacity-50 pointer-events-none"></div>
            <div className="relative z-10 flex flex-col items-center">
              <style>{`
                .preview-icon {
                  color: ${color};
                  filter: drop-shadow(0 0 ${glow * 10}px ${color}) blur(${blur}px);
                  animation: preview-anim ${duration}s infinite ${timingFunc};
                  display: inline-block;
                  font-size: 120px !important;
                  font-variation-settings: 'FILL' ${isFilled ? 1 : 0};
                }
                @keyframes preview-anim {
                  ${getKeyframes()}
                }
              `}</style>
              <div className="h-64 flex items-center justify-center">
                <span className="material-symbols-outlined preview-icon">{iconName}</span>
              </div>
            </div>
          </div>

          {/* Right: Controls Panel */}
          <div className="w-full md:w-96 bg-[#111111] p-8 flex flex-col gap-8 overflow-y-auto">
            {/* Icon Selection */}
            <div>
              <div className="flex justify-between items-end mb-2">
                <label className="block text-xs font-bold tracking-widest text-neutral-500 uppercase">Icon Name</label>
                <a href="https://fonts.google.com/icons?icon.set=Material+Symbols" target="_blank" rel="noreferrer" className="text-[10px] text-blue-400 hover:text-blue-300 flex items-center gap-1">
                  Material Library <ExternalLinkIcon />
                </a>
              </div>
              <div className="flex gap-2 mb-4">
                <input type="text" value={iconName} onChange={(e) => setIconName(e.target.value)}
                  className="flex-1 bg-neutral-900 border border-neutral-800 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors"
                  placeholder="e.g. home, settings" />
                <button onClick={() => setIsPickerOpen(true)}
                  className="bg-neutral-800 hover:bg-neutral-700 text-white px-4 rounded-lg transition-colors flex items-center justify-center"
                  title="Browse Icons">
                  <SearchIcon size={18} />
                </button>
              </div>
              <label className="block text-xs font-bold tracking-widest text-neutral-500 mb-2 uppercase">Style</label>
              <div className="grid grid-cols-2 gap-2">
                <button onClick={() => setIsFilled(false)}
                  className={`py-2 px-3 rounded-md text-sm transition-colors ${!isFilled ? 'bg-blue-500/20 text-blue-400 border border-blue-500/50' : 'bg-neutral-800/50 text-neutral-400 border border-transparent hover:bg-neutral-800'}`}>
                  Outline
                </button>
                <button onClick={() => setIsFilled(true)}
                  className={`py-2 px-3 rounded-md text-sm transition-colors ${isFilled ? 'bg-blue-500/20 text-blue-400 border border-blue-500/50' : 'bg-neutral-800/50 text-neutral-400 border border-transparent hover:bg-neutral-800'}`}>
                  Fill
                </button>
              </div>
            </div>

            {/* Animation Style */}
            <div>
              <label className="block text-xs font-bold tracking-widest text-neutral-500 mb-4 uppercase">Animation</label>
              <div className="grid grid-cols-2 gap-2">
                {['pulse', 'spin', 'float', 'shake'].map((style) => (
                  <button key={style} onClick={() => setAnimStyle(style)}
                    className={`py-2 px-3 rounded-md text-sm capitalize transition-colors ${animStyle === style ? 'bg-blue-500/20 text-blue-400 border border-blue-500/50' : 'bg-neutral-800/50 text-neutral-400 border border-transparent hover:bg-neutral-800'}`}>
                    {style}
                  </button>
                ))}
              </div>
            </div>

            {/* Speed */}
            <div>
              <div className="flex justify-between items-center mb-4">
                <label className="text-xs font-bold tracking-widest text-neutral-500 uppercase">Speed</label>
                <span className="text-blue-400 text-sm font-mono">{speed.toFixed(1)}x</span>
              </div>
              <input type="range" min="0.1" max="3.0" step="0.1" value={speed} onChange={(e) => setSpeed(parseFloat(e.target.value))} className="w-full" />
            </div>

            {/* Blur */}
            <div>
              <div className="flex justify-between items-center mb-4">
                <label className="text-xs font-bold tracking-widest text-neutral-500 uppercase">Blur</label>
                <span className="text-blue-400 text-sm font-mono">{blur}px</span>
              </div>
              <input type="range" min="0" max="20" step="1" value={blur} onChange={(e) => setBlur(parseInt(e.target.value))} className="w-full" />
            </div>

            {/* Glow */}
            <div>
              <div className="flex justify-between items-center mb-4">
                <label className="text-xs font-bold tracking-widest text-neutral-500 uppercase">Glow Intensity</label>
                <span className="text-blue-400 text-sm font-mono">{glow.toFixed(1)}</span>
              </div>
              <input type="range" min="0" max="3.0" step="0.1" value={glow} onChange={(e) => setGlow(parseFloat(e.target.value))} className="w-full" />
            </div>

            {/* Color */}
            <div>
              <label className="block text-xs font-bold tracking-widest text-neutral-500 mb-4 uppercase">Color</label>
              <div className="flex items-center gap-4">
                <div className="relative w-12 h-12 rounded-md overflow-hidden border border-neutral-700 shrink-0">
                  <input type="color" value={color} onChange={(e) => setColor(e.target.value)}
                    className="absolute inset-[-10px] w-[calc(100%+20px)] h-[calc(100%+20px)] cursor-pointer" />
                </div>
                <div className="flex-1 bg-neutral-900 border border-neutral-800 rounded-lg px-4 py-3 flex items-center">
                  <span className="text-neutral-400 font-mono text-sm">{color}</span>
                </div>
              </div>
            </div>

            <div className="flex-1"></div>

            {/* Action Buttons */}
            <div className="flex flex-col gap-3 pt-6 border-t border-neutral-800">
              <button onClick={handleExportReact}
                className="w-full bg-white text-black hover:bg-neutral-200 transition-colors py-3 px-4 rounded-xl font-medium flex items-center justify-center gap-2">
                <DownloadIcon /> Export React Component
              </button>
              <button onClick={handleCopyCSS}
                className="w-full bg-neutral-800 text-white hover:bg-neutral-700 transition-colors py-3 px-4 rounded-xl font-medium flex items-center justify-center gap-2">
                {copied ? <CheckIcon /> : <CopyIcon />}
                {copied ? 'Copied!' : 'Copy CSS'}
              </button>
            </div>
          </div>

          {/* Icon Picker Modal */}
          {isPickerOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm p-4">
              <div className="bg-[#111111] border border-neutral-800 rounded-2xl w-full max-w-3xl max-h-[85vh] flex flex-col shadow-2xl">
                <div className="p-4 border-b border-neutral-800 flex justify-between items-center">
                  <h2 className="text-lg font-semibold">Select Icon</h2>
                  <button onClick={() => setIsPickerOpen(false)} className="text-neutral-400 hover:text-white p-1"><XIcon size={20} /></button>
                </div>
                <div className="p-4 border-b border-neutral-800">
                  <div className="relative">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-500"><SearchIcon size={18} /></span>
                    <input type="text" placeholder="Search popular icons..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                      className="w-full bg-neutral-900 border border-neutral-800 rounded-lg pl-10 pr-4 py-3 text-white focus:outline-none focus:border-blue-500 transition-colors" />
                  </div>
                </div>
                <div className="flex-1 overflow-y-auto p-4">
                  <div className="grid grid-cols-4 sm:grid-cols-6 md:grid-cols-8 gap-3">
                    {filteredIcons.map(icon => (
                      <button key={icon} onClick={() => { setIconName(icon); setIsPickerOpen(false); }}
                        className="flex flex-col items-center gap-2 p-3 rounded-xl hover:bg-neutral-800 border border-transparent hover:border-neutral-700 transition-all group">
                        <span className="material-symbols-outlined text-3xl text-neutral-300 group-hover:text-white transition-colors"
                          style={{ fontVariationSettings: `'FILL' ${isFilled ? 1 : 0}` }}>{icon}</span>
                        <span className="text-[10px] text-neutral-500 group-hover:text-neutral-300 truncate w-full text-center">{icon}</span>
                      </button>
                    ))}
                    {filteredIcons.length === 0 && (
                      <div className="col-span-full py-12 text-center text-neutral-500">
                        No icons found. You can still type any valid Material Symbol name directly in the input box!
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
